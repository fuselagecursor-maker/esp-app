; ESP32 drone bridge — USB flash first (includes OTA), then Wi‑Fi uploads.
;
; USB (first time + when OTA fails):
;   pio run -e esp32dev -t upload
;
; Wi‑Fi (PC on "ESP32-LED-CTRL", password esp32demo):
;   pio run -e esp32dev_ota -t upload
;
; If pio shows HTTPClientError installing tool-openocd-esp32, either retry on a
; stable network or use:  .\ota_upload.ps1

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags =
    --auth=esp32demo
